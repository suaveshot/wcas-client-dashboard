<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in · WCAS Client Dashboard</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css?v=20260422">
</head>
<body>
<main class="landing">
    <span class="landing__eyebrow">WestCoast Automation Solutions</span>
    <h1>Sign in to your dashboard</h1>
    <p class="landing__lead">
        Enter the email on your account. We'll send you a one-time
        link that signs you in.
    </p>

    {% if error %}
    <p class="landing__error" role="alert" style="color: var(--warn); font-weight: 600; margin-bottom: 16px;">
        {{ error }}
    </p>
    {% endif %}

    <form method="post" action="/auth/request" class="landing__form" style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <label for="email" class="ap-sr">Email</label>
        <input id="email" type="email" name="email" required autocomplete="email"
               inputmode="email" placeholder="you@yourcompany.com"
               style="padding:12px 16px; border:1px solid var(--border-strong); border-radius:var(--r-sm); font-family:var(--font-body); font-size:16px; min-width:260px;">
        <button type="submit"
                style="padding:12px 22px; background: var(--accent); color:#fff; border:0; border-radius:var(--r-sm); font-family:var(--font-body); font-weight:600; font-size:16px; cursor:pointer;">
            Email me a link
        </button>
    </form>

    <div class="landing__meta" style="margin-top:32px;">
        <p>Need help? Email <a href="mailto:sam@westcoastautomationsolutions.com">sam@westcoastautomationsolutions.com</a>.</p>
        <p><a href="/">Back to landing</a></p>
    </div>
</main>
</body>
</html>
