services:
  dashboard:
    build: .
    container_name: wcas-dashboard
    restart: unless-stopped
    env_file:
      - .env
    # Tenant data lives at /opt/wc-solns/<tenant>/ inside the container
    # (the Dockerfile creates that directory and chowns it to the app user).
    # Keep this aligned with services/tenant_manager.py paths.
    volumes:
      - tenant-data:/opt/wc-solns
    ports:
      - "127.0.0.1:8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`dashboard.westcoastautomationsolutions.com`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  tenant-data:
    driver: local
